name: Helm Charts Publish

on:
  push:
    branches: ["main"]
    paths:
      - 'charts/**'
      - '.github/workflows/helm-gh-pages.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  packages: write

jobs:
  publish-helm-charts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Publish Helm Charts
        uses: ./.github/actions/helm-gh-pages-publish
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          charts-dir: charts
