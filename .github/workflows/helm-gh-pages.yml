name: Helm Charts Publish

on:
  push:
    branches: ["main"]
    paths:
      - 'charts/**'
      - '.github/workflows/helm-gh-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write

jobs:
  publish-helm-charts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
      - id: package
        uses: ./.github/actions/helm-package
        with:
          charts-root: charts
          output-dir: artifacts/helm
      - uses: ./.github/actions/gh-pages-deploy
        with:
          publish-dir: ${{ steps.package.outputs.packages-dir }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
