name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  sast:
    name: "SAST Scan ${{ matrix.checks }}"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        checks:
          - advisories
          - bans licenses sources
    continue-on-error: ${{ matrix.checks == 'advisories' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v4.2.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
        with:
          toolchain: stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@11da8522bc3856a8fbc565f1d1530989c793d67d # v2.7.7

      - name: Run cargo-deny
        uses: EmbarkStudios/cargo-deny-action@3fd3802e88374d3fe9159b834c7714ec57d6c979 # v2.0.11
        with:
          command: check ${{ matrix.checks }}

  code-checks:
    name: Code Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v4.2.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Rust Cache
        uses: Swatinem/rust-cache@11da8522bc3856a8fbc565f1d1530989c793d67d # v2.7.7

      - name: Run cargo check
        run: cargo check --all-targets --all-features

      - name: Run cargo fmt
        run: cargo fmt -- --check

      - name: Run cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Unit & Doc Tests
    needs: [code-checks]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lightbridge_authz
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v4.2.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
        with:
          toolchain: stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@11da8522bc3856a8fbc565f1d1530989c793d67d # v2.7.7

      - name: Run tests
        run: cargo test --workspace
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/lightbridge_authz

  integration-test:
    name: Integration Tests (Docker Compose)
    needs: [code-checks]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@7c525be6cc8a882d5163ce04293cac18617c709f # v3.9.0

      - name: Start Test Stack
        run: docker compose -f compose.yaml -f compose.it.yaml up -d

      - name: Wait for Services
        run: |
          echo "Waiting for authz-opa to be healthy..."
          # The authz-opa service has a healthcheck defined in compose.yaml
          MAX_RETRIES=30
          COUNT=0
          until [ "$(docker compose ps authz-opa --format '{{.Health}}')" == "healthy" ]; do
            if [ $COUNT -ge $MAX_RETRIES ]; then
              echo "Timeout waiting for services to be healthy"
              docker compose ps
              docker compose logs
              exit 1
            fi
            echo "Still waiting ($COUNT/$MAX_RETRIES)..."
            sleep 5
            COUNT=$((COUNT + 1))
          done
          echo "Services are healthy!"

      - name: Run Integration Test Runner
        run: docker compose -f compose.it.yaml run it-authorino

      - name: Collect Logs on Failure
        if: failure()
        run: |
          docker compose -f compose.yaml -f compose.it.yaml logs

      - name: Shut Down Stack
        if: always()
        run: docker compose -f compose.yaml -f compose.it.yaml down -v

  build:
    name: Build
    needs: [test, integration-test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v4.2.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
        with:
          toolchain: stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@11da8522bc3856a8fbc565f1d1530989c793d67d # v2.7.7

      - name: Build release binaries
        run: cargo build --profile prod --all-targets --all-features

      - name: Package artifacts
        run: tar -czf release-artifacts.tar.gz -C target/prod .

      - name: Upload artifact
        uses: actions/upload-artifact@47309c993abb98030a35d55ef7ff34b7fa1074b5 # v4.7.0
        with:
          name: release-artifacts
          path: release-artifacts.tar.gz

  release:
    name: Release
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v4.2.2

      - name: Download artifact
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v4.1.7
        with:
          name: release-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@e798e6a1ede8d07b74ac4cdac6bdfa4cc1653907 # v2.2.1
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          files: release-artifacts.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
