name: CI/CD Pipeline
on:
  push: {}
  pull_request: {}

jobs:
  sast:
    name: SAST Scan
    runs-on: ubuntu-latest
    strategy:
      matrix:
        checks: [advisories,"bans licenses sources"]
    steps:
      - name: Checkout repo
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
      - uses: ./.github/actions/cargo-deny
        with:
          check: ${{ matrix.checks }}

  code-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
      - uses: ./.github/actions/code-checks

  test:
    needs: code-checks
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lightbridge_authz
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout repo
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
      - uses: ./.github/actions/tests
        with:
          database-url: postgres://postgres:postgres@localhost:5432/lightbridge_authz

  integration-test:
    needs: code-checks
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
      - uses: ./.github/actions/integration-test

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
      - uses: ./.github/actions/build-release

  container-build:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: authz
            target: runtime
            image-name: ${{ github.repository }}
          - name: usage
            target: usage-runtime
            image-name: adorsys-gis/lightbridge-authz-usage
          - name: usage-migrate
            target: usage-migrate
            image-name: adorsys-gis/lightbridge-authz-usage-migrate
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
      - name: Build and push Docker image
        uses: ./.github/actions/container-build
        with:
          app-version: ${{ github.sha }}
          image-name: ${{ matrix.image-name }}
          target: ${{ matrix.target }}

  release:
    needs: [build,container-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
      - uses: ./.github/actions/release
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
