name: CI/CD Pipeline
on:
  push: {}
  pull_request: {}

jobs:
  sast:
    name: SAST Scan
    runs-on: ubuntu-latest
    strategy:
      matrix:
        checks: [advisories,"bans licenses sources"]
    steps:
      - uses: ./.github/actions/cargo-deny
        with:
          check: ${{ matrix.checks }}

  code-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/code-checks

  test:
    needs: code-checks
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lightbridge_authz
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: ./.github/actions/tests
        with:
          database-url: postgres://postgres:postgres@localhost:5432/lightbridge_authz

  integration-test:
    needs: code-checks
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/integration-test

  build:
    needs: [test,integration-test]
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/build-release

  container-build:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: ./.github/actions/container-build
        with:
          ghcr-token: ${{ secrets.GITHUB_TOKEN }}

  release:
    needs: [build,container-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: ./.github/actions/release
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
