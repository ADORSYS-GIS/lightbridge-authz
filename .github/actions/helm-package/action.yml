name: Helm Package
description: Package Helm charts and emit a repo index.
inputs:
  charts-root:
    description: Directory containing chart directories
    required: false
    default: charts
  output-dir:
    description: Directory to place packaged charts and index
    required: false
    default: artifacts/helm
  repo-url:
    description: URL that will host the generated index.yaml (overrides the default GitHub Pages URL)
    required: false
outputs:
  packages-dir:
    description: Directory where packages and index.yaml are placed
runs:
  using: composite
  steps:
    - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
    - uses: azure/setup-helm@5119fcb9089d432beecbf79bb2c7915207344b78
    - name: Package charts
      shell: bash
      run: |
        set -euo pipefail
        shopt -s nullglob
        CHARTS_ROOT="${{ inputs.charts-root }}"
        OUTPUT_DIR="${{ inputs.output-dir }}"
        REPO_URL="${{ inputs.repo-url }}"

        mkdir -p "$OUTPUT_DIR"
        rm -f "$OUTPUT_DIR"/*

        if [ -z "$REPO_URL" ]; then
          OWNER="${GITHUB_REPOSITORY_OWNER}"
          REPO="${GITHUB_REPOSITORY#*/}"
          REPO_URL="https://${OWNER}.github.io/${REPO}"
        fi

        echo "Packaging charts from $CHARTS_ROOT to $OUTPUT_DIR"
        found=false
        for chart_dir in "$CHARTS_ROOT"/*; do
          if [ -d "$chart_dir" ] && [ -f "$chart_dir/Chart.yaml" ]; then
            found=true
            helm dependency update "$chart_dir" || true
            helm package "$chart_dir" -d "$OUTPUT_DIR"
          fi
        done

        if [ "$found" != true ]; then
          echo "No charts found under $CHARTS_ROOT"
          exit 1
        fi

        helm repo index "$OUTPUT_DIR" --url "$REPO_URL"
        echo "packages-dir=$OUTPUT_DIR" >> "$GITHUB_OUTPUT"
