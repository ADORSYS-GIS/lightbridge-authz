name: Setup Docker
description: Composite action that logs into GHCR, prepares buildx, and computes metadata.

inputs:
  app-version:
    description: Version of the application
    required: true
  image-name:
    description: Name of the image
    required: true
  tag-suffix:
    description: Optional suffix appended to generated tags (for example -arm)
    required: false
    default: ""
  registry:
    description: Container registry
    required: false
    default: ghcr.io
  github-token:   # ✅ NEW
    description: GitHub token for registry auth
    required: true

outputs:
  annotations:
    description: Labels
    value: ${{ steps.meta.outputs.annotations }}
  labels:
    description: Labels
    value: ${{ steps.meta.outputs.labels }}
  tags:
    description: Tags
    value: ${{ steps.meta.outputs.tags }}

runs:
  using: composite
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3.12.0

    - name: Authenticate to GHCR
      uses: docker/login-action@v3.7.0
      with:
        registry: ${{ inputs.registry }}
        username: ${{ github.actor }}
        password: ${{ inputs.github-token }}   # ✅ FIXED

    - id: lowercase
      name: Lowercase image name
      uses: AsZc/change-string-case-action@ccb130a4e483d3e86287289183704dc9bf53e77e
      with:
        string: ${{ inputs.image-name }}

    - name: Extract metadata (tags, labels) for Docker
      id: meta
      uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051
      with:
        tags: |
          type=raw,value=latest${{ inputs.tag-suffix }},enable={{is_default_branch}}
          type=raw,value={{branch}}${{ inputs.tag-suffix }}
          type=raw,value=${{ inputs.app-version }}${{ inputs.tag-suffix }}
          type=schedule,pattern={{date 'YYYYMMDD-hhmmss' tz='Europe/Berlin'}}${{ inputs.tag-suffix }}
          type=sha,format=long,suffix=${{ inputs.tag-suffix }}
          type=sha,format=long,prefix={{branch}},suffix=${{ inputs.tag-suffix }}
        images: ${{ inputs.registry }}/${{ steps.lowercase.outputs.lowercase }}