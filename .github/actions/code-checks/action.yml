name: Code Checks
runs:
  using: composite
  steps:
    - uses: ./.github/actions/rust-setup
      with:
        components: clippy,rustfmt
    - shell: bash
      run: cargo check --all-targets --all-features
    - shell: bash
      run: cargo fmt -- --check
    - shell: bash
      run: cargo clippy --all-targets --all-features -- -D warnings
