name: Integration Tests
runs:
  using: composite
  steps:
    - uses: docker/setup-buildx-action@7c525be6cc8a882d5163ce04293cac18617c709f
    - uses: ./.github/actions/rust-setup
    - run: |
        sudo apt-get update
        sudo apt-get install -y just
      shell: bash
    - name: Run Authorino test stack
      shell: bash
      run: |
        set -eo pipefail
        docker compose -f compose.yaml -f compose.it.yaml up -d
        MAX_RETRIES=30
        COUNT=0
        until [ "$(docker compose ps authz-opa --format '{{.Health}}')" = "healthy" ]; do
          if [ $COUNT -ge $MAX_RETRIES ]; then
            echo "Timeout waiting for services to be healthy"
            docker compose ps
            docker compose logs
            exit 1
          fi
          echo "Still waiting ($COUNT/$MAX_RETRIES)..."
          sleep 5
          COUNT=$((COUNT + 1))
        done
        just it-authorino
    - run: docker compose -f compose.yaml -f compose.it.yaml logs
      if: failure()
    - run: just it-authorino-down
      if: always()
