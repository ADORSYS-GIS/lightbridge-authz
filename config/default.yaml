server:
  api:
    address: "0.0.0.0"
    port: 3000
    tls:
      cert_path: "./config/tls/api.crt"
      key_path: "./config/tls/api.key"
  opa:
    address: "0.0.0.0"
    port: 3001
    tls:
      cert_path: "./config/tls/opa.crt"
      key_path: "./config/tls/opa.key"
    basic_auth:
      username: "authorino"
      password: "change-me"
logging:
  level: "info"
database:
  url: "postgres://postgres:postgres@localhost:5432/lightbridge_authz"
  pool_size: 10
oauth2:
  jwks_url: "http://localhost:9100/realms/dev/protocol/openid-connect/certs"
  oauth2_url: "http://localhost:9100/realms/dev/protocol/openid-connect/token"
  issuance:
    enabled: true
    grant_type: "urn:ietf:params:oauth:grant-type:token-exchange"
    client_id: "${KEYCLOAK_TOKEN_CLIENT_ID:-lightbridge-token-issuer}"
    client_secret: "${KEYCLOAK_TOKEN_CLIENT_SECRET:-lightbridge-token-issuer-secret}"
    subject_token_type: "urn:ietf:params:oauth:token-type:access_token"
    requested_token_type: "urn:ietf:params:oauth:token-type:access_token"
    audience: "${KEYCLOAK_TOKEN_AUDIENCE:-lightbridge-token-issuer}"
otel:
  enabled: true
  otlp_endpoint: "http://localhost:4317"
  service_name: "lightbridge-authz"
