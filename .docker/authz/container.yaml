server:
  api:
    address: "0.0.0.0"
    port: 3000
    tls:
      cert_path: "${TLS_CERT_PATH:-/tls/api.crt}"
      key_path: "${TLS_KEY_PATH:-/tls/api.key}"
  opa:
    address: "0.0.0.0"
    port: 3001
    tls:
      cert_path: "${OPA_TLS_CERT_PATH:-/tls/opa.crt}"
      key_path: "${OPA_TLS_KEY_PATH:-/tls/opa.key}"
    basic_auth:
      username: "authorino"
      password: "change-me"
logging:
  level: "info"
database:
  url: "postgres://postgres:postgres@postgresql:5432/lightbridge_authz"
  pool_size: 10
oauth2:
  jwks_url: "http://keycloak:9100/realms/dev/protocol/openid-connect/certs"
  oauth2_url: "http://keycloak:9100/realms/dev/protocol/openid-connect/token"
  # Expected audience claim(s) in JWT tokens.
  # Tokens must contain at least one matching audience value.
  #
  # Valid audience values:
  #   - lightbridge-api-key: Primary audience for API Key service
  #   - lightbridge-token-issuer: Audience for token issuer service
  #
  # For production deployments, set via environment:
  #   OAUTH2__AUDIENCE='["lightbridge-api-key"]'
  audience:
    - "lightbridge-api-key"
    - "lightbridge-token-issuer"
  issuance:
    enabled: true
    grant_type: "urn:ietf:params:oauth:grant-type:token-exchange"
    client_id: "${KEYCLOAK_TOKEN_CLIENT_ID:-lightbridge-token-issuer}"
    client_secret: "${KEYCLOAK_TOKEN_CLIENT_SECRET:-lightbridge-token-issuer-secret}"
    subject_token_type: "urn:ietf:params:oauth:token-type:access_token"
    requested_token_type: "urn:ietf:params:oauth:token-type:access_token"
    # Target audience for issued tokens - must match one of the valid audiences above
    # audience: "lightbridge-api-key"
otel:
  enabled: true
  otlp_endpoint: "http://jaeger:4317"
  service_name: "lightbridge-authz"
