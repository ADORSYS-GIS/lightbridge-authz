server:
  api:
    address: "0.0.0.0"
    port: 3000
    tls:
      cert_path: "${TLS_CERT_PATH:-/tls/api.crt}"
      key_path: "${TLS_KEY_PATH:-/tls/api.key}"
  opa:
    address: "0.0.0.0"
    port: 3001
    tls:
      cert_path: "${OPA_TLS_CERT_PATH:-/tls/opa.crt}"
      key_path: "${OPA_TLS_KEY_PATH:-/tls/opa.key}"
    basic_auth:
      username: "authorino"
      password: "change-me"
logging:
  level: "info"
database:
  url: "postgres://postgres:postgres@postgresql:5432/lightbridge_authz"
  pool_size: 10
oauth2:
  jwks_url: "http://keycloak:9100/realms/dev/protocol/openid-connect/certs"
otel:
  enabled: true
  otlp_endpoint: "http://jaeger:4317"
  service_name: "lightbridge-authz"
