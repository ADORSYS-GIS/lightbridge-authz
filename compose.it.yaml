---
services:
  it-authorino:
    image: python:3.12-slim
    depends_on:
      authz-api:
        condition: service_started
      authz-opa:
        condition: service_started
      keycloak:
        condition: service_started
    volumes:
      - "./.docker/it/authorino_it.py:/it/authorino_it.py:ro"
    environment:
      KEYCLOAK_URL: "http://keycloak:9100"
      API_URL: "https://authz-api:3000"
      OPA_URL: "https://authz-opa:3001"
      CLIENT_ID: "test-client"
      USERNAME: "test@admin"
      PASSWORD: "test"
      AUTHORINO_BASIC: "authorino:change-me"
      MAX_WAIT_SECONDS: "180"
    command: ["python", "/it/authorino_it.py"]

  it-servers:
    image: python:3.12-slim
    depends_on:
      authz-api:
        condition: service_started
      authz-opa:
        condition: service_started
      authz-usage:
        condition: service_started
      authz-mcp:
        condition: service_started
      keycloak:
        condition: service_started
    volumes:
      - "./.docker/it/servers_it.py:/it/servers_it.py:ro"
    environment:
      KEYCLOAK_URL: "http://keycloak:9100"
      API_URL: "https://authz-api:3000"
      OPA_URL: "https://authz-opa:3001"
      USAGE_URL: "https://authz-usage:3002"
      MCP_URL: "https://authz-mcp:3000"
      CLIENT_ID: "test-client"
      USERNAME: "test@admin"
      PASSWORD: "test"
      AUTHORINO_BASIC: "authorino:change-me"
      MAX_WAIT_SECONDS: "180"
    command: ["python", "/it/servers_it.py"]
