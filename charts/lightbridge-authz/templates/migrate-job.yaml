{{- if .Values.migrateJob.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "lightbridge-authz.fullname" . }}-migrate
  labels:
    {{- include "lightbridge-authz.labels" . | nindent 4 }}
    {{- with .Values.migrateJob.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: hook-succeeded
    {{- with .Values.migrateJob.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ttlSecondsAfterFinished: {{ .Values.migrateJob.ttlSecondsAfterFinished }}
  backoffLimit: {{ .Values.migrateJob.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "lightbridge-authz.labels" . | nindent 8 }}
        {{- with .Values.migrateJob.labels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "lightbridge-authz.serviceAccountName" . }}
      restartPolicy: {{ .Values.migrateJob.restartPolicy }}
      {{- with .Values.migrateJob.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: migrate
          image: {{ include "lightbridge-authz.migrateJobImage" . }}
          imagePullPolicy: {{ include "lightbridge-authz.migrateJobPullPolicy" . }}
          command:
            - sh
            - -c
          args:
            - |
              set -euo pipefail
              CONFIG_DIR=/tmp/lightbridge-config
              CONFIG_FILE="$CONFIG_DIR/config.yaml"
              mkdir -p "$CONFIG_DIR"
              cat <<'EOF' > "$CONFIG_FILE"
{{ toYaml .Values.config | nindent 14 }}
              EOF
              lightbridge-authz migrate --config-path "$CONFIG_FILE"
          env:
            {{ include "lightbridge-authz.mergeEnv" (dict "configPath" "/tmp/lightbridge-config" "configFile" "config.yaml" "extra" .Values.migrateJob.env) | toYaml | nindent 12 }}
{{- end }}
