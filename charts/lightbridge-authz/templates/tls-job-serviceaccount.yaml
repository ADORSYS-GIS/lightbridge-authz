{{- if and .Values.tls.enabled .Values.tls.job.enabled .Values.tls.job.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "lightbridge-authz.tlsJobServiceAccountName" . }}
  labels:
    {{- include "lightbridge-authz.labels" . | nindent 4 }}
  {{- with .Values.tls.job.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.tls.job.serviceAccount.automount }}
{{- end }}
