{{- if .Values.configMap.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "lightbridge-authz.configMapName" . }}
  labels:
    {{- include "lightbridge-authz.labels" . | nindent 4 }}
    {{- with .Values.configMap.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.configMap.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
data:
  {{ .Values.configMap.fileName }}: |-
    {{- toYaml .Values.config | nindent 4 }}
{{- end }}
