{{- if include "lightbridge-authz.shouldUseKnative" . }}
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: {{ include "lightbridge-authz.fullname" . }}
  labels:
    {{- include "lightbridge-authz.labels" . | nindent 4 }}
  {{- with .Values.knative.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  template:
    metadata:
      labels:
        {{- include "lightbridge-authz.labels" . | nindent 8 }}
        {{- include "lightbridge-authz.selectorLabels" . | nindent 8 }}
        {{- with .Values.knative.template.labels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.knative.template.annotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.knative.template.timeoutSeconds }}
      timeoutSeconds: {{ . }}
      {{- end }}
      {{- with .Values.knative.template.containerConcurrency }}
      containerConcurrency: {{ . }}
      {{- end }}
      serviceAccountName: {{ include "lightbridge-authz.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if .Values.command }}
          command:
            {{- toYaml .Values.command | nindent 12 }}
          {{- end }}
          {{- if .Values.args }}
          args:
            {{- toYaml .Values.args | nindent 12 }}
          {{- end }}
          env:
            - name: CONFIG_PATH
              value: "{{ .Values.configMap.mountPath }}/{{ .Values.configMap.fileName }}"
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: {{ .Values.configMap.mountPath }}
              readOnly: true
            {{- if .Values.tls.enabled }}
            - name: tls
              mountPath: {{ .Values.tls.mountPath }}
              readOnly: true
            {{- end }}
            {{- with .Values.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "lightbridge-authz.configMapName" . }}
        {{- if .Values.tls.enabled }}
        - name: tls
          secret:
            secretName: {{ include "lightbridge-authz.tlsSecretName" . }}
        {{- end }}
        {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
