enabled: true

global:
  config:
    logging:
      level: info
    database:
      url: "${DATABASE_URL}"
      pool_size: 10
    oauth2:
      jwks_url: http://keycloak:9100/realms/dev/protocol/openid-connect/certs
    server:
      api:
        address: 0.0.0.0
        port: 3000
        tls:
          cert_path: /etc/lightbridge/tls/api.crt
          key_path: /etc/lightbridge/tls/api.key
      opa:
        address: 0.0.0.0
        port: 3000
        tls:
          cert_path: /etc/lightbridge/tls/opa.crt
          key_path: /etc/lightbridge/tls/opa.key
        basic_auth:
          username: authorino
          password: "${OPA_PASSWORD}"

controllers:
  main:
    enabled: true
    type: job
    containers:
      main:
        image:
          repository: lightbridge-authz
          tag: 0.5.0
        command:
          - lightbridge-authz
          - migrate
          - "--config-path"
          - /tmp/lightbridge-config/config.yaml
        env:
          DATABASE_URL:
            valueFrom:
              secretKeyRef:
                identifier: secret
                key: DATABASE_URL
          OPA_PASSWORD:
            valueFrom:
              secretKeyRef:
                identifier: secret
                key: OPA_PASSWORD
    job:
      backoffLimit: 3
      ttlSecondsAfterFinished: 300

configMaps:
  config:
    enabled: true
    data:
      config.yaml: |-
        logging:
          level: info
        database:
          url: "${DATABASE_URL}"
          pool_size: 10
        oauth2:
          jwks_url: http://keycloak:9100/realms/dev/protocol/openid-connect/certs
        server:
          api:
            address: 0.0.0.0
            port: 3000
            tls:
              cert_path: /etc/lightbridge/tls/api.crt
              key_path: /etc/lightbridge/tls/api.key
          opa:
            address: 0.0.0.0
            port: 3000
            tls:
              cert_path: /etc/lightbridge/tls/opa.crt
              key_path: /etc/lightbridge/tls/opa.key
            basic_auth:
              username: authorino
              password: "${OPA_PASSWORD}"

secrets:
  secret:
    enabled: true
    stringData:
      DATABASE_URL: postgres://postgres:postgres@lb-postgres-postgresql.default.svc.cluster.local:5432/lightbridge_authz
      OPA_PASSWORD: change-me

persistence:
  config:
    enabled: true
    type: configMap
    name: '{{ include "bjw-s.common.lib.chart.names.fullname" $ }}-config'
    advancedMounts:
      main:
        main:
          - path: /tmp/lightbridge-config
            readOnly: true

serviceAccount:
  create: true
