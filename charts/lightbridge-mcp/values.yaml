enabled: true

global:
  authz_mcp:
    image:
      version: "0.8.0"
      repository: "ghcr.io/adorsys-gis/lightbridge-authz-mcp"

controllers:
  main:
    type: deployment
    replicas: 1
    containers:
      authz:
        image:
          repository: "{{ .Values.global.authz_mcp.image.repository }}"
          tag: "{{ .Values.global.authz_mcp.image.version }}"
          pullPolicy: IfNotPresent
        args:
          - serve
          - --config-path
          - /etc/lightbridge/config.yaml
        ports:
          - name: http
            containerPort: 3000
            protocol: TCP
        env:
          DATABASE_URL:
            valueFrom:
              secretKeyRef:
                name: db-secret
                key: DATABASE_URL
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              initialDelaySeconds: 15
              periodSeconds: 10
              timeoutSeconds: 2
              failureThreshold: 3
              httpGet:
                scheme: HTTPS
                path: /healthz
                port: http
          readiness:
            enabled: true
            custom: true
            spec:
              initialDelaySeconds: 5
              periodSeconds: 10
              timeoutSeconds: 2
              failureThreshold: 3
              httpGet:
                scheme: HTTPS
                path: /healthz/ready
                port: http
          startup:
            enabled: true
            custom: true
            spec:
              failureThreshold: 30
              periodSeconds: 5
              timeoutSeconds: 2
              httpGet:
                scheme: HTTPS
                path: /healthz/startup
                port: http

configMaps:
  config:
    enabled: true
    data:
      config.yaml: |-
        logging:
          level: info
        database:
          url: "${DATABASE_URL}"
          pool_size: 10
        oauth2:
          jwks_url: http://keycloak:9100/realms/dev/protocol/openid-connect/certs
        server:
          api:
            address: 0.0.0.0
            port: 3000
            tls:
              cert_path: /etc/lightbridge/tls/api.crt
              key_path: /etc/lightbridge/tls/api.key
          opa:
            address: 0.0.0.0
            port: 3000
            tls:
              cert_path: /etc/lightbridge/tls/opa.crt
              key_path: /etc/lightbridge/tls/opa.key
            basic_auth:
              username: authorino
              password: "${OPA_PASSWORD}"
        otel:
          enabled: true
          otlp_endpoint: "http://localhost:4317"
          service_name: "lightbridge-authz"


service:
  authz:
    controller: main
    ports:
      http:
        port: 3000

persistence:
  config:
    enabled: true
    type: configMap
    identifier: config
    advancedMounts:
      main:
        authz:
          - path: /etc/lightbridge/config.yaml
            subPath: config.yaml
            readOnly: true
  tls:
    enabled: true
    type: secret
    name: '{{ include "bjw-s.common.lib.chart.names.fullname" $ }}-tls'
    globalMounts:
      - path: /etc/lightbridge/tls
        readOnly: true

