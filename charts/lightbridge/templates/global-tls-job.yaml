{{- if and .Values.global.tls.enabled .Values.global.tls.job.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "lightbridge.globalTlsJobName" . }}
  labels:
    helm.sh/chart: {{ include "lightbridge.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-delete-policy: hook-succeeded
{{- with .Values.global.tls.job.annotations }}
    {{- toYaml . | nindent 4 }}
{{- end }}
spec:
  ttlSecondsAfterFinished: {{ .Values.global.tls.job.ttlSecondsAfterFinished }}
  backoffLimit: {{ .Values.global.tls.job.backoffLimit }}
  template:
    metadata:
      labels:
        helm.sh/chart: {{ include "lightbridge.chart" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/managed-by: {{ .Release.Service }}
        {{- with .Values.global.tls.job.labels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "lightbridge.globalTlsJobSAName" . }}
      restartPolicy: {{ .Values.global.tls.job.restartPolicy }}
      containers:
        - name: generate-tls
          image: {{ .Values.global.tls.job.image.repository }}:{{ .Values.global.tls.job.image.tag }}
          command:
            - sh
            - -c
          args:
            - |
              set -euo pipefail
              SECRET={{ include "lightbridge.globalTlsSecretName" . }}
              if kubectl get secret "$SECRET" >/dev/null 2>&1; then
                echo "secret $SECRET already exists, skipping TLS generation"
                exit 0
              fi
              mkdir -p /tls
{{- if .Values.global.tls.job.addKubectlOpenssl }}
              apt-get update >/dev/null && apt-get install -y openssl >/dev/null
{{- end }}
              openssl req -x509 -newkey rsa:2048 -nodes -days 3650 \
                -keyout /tls/api.key -out /tls/api.crt -subj "/CN={{ .Values.global.tls.apiCommonName }}"
              openssl req -x509 -newkey rsa:2048 -nodes -days 3650 \
                -keyout /tls/opa.key -out /tls/opa.crt -subj "/CN={{ .Values.global.tls.opaCommonName }}"
              kubectl create secret generic "$SECRET" \
                --from-file=api.crt=/tls/api.crt \
                --from-file=api.key=/tls/api.key \
                --from-file=opa.crt=/tls/opa.crt \
                --from-file=opa.key=/tls/opa.key >/dev/null
{{- end }}
