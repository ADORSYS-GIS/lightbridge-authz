apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "lightbridge.globalConfigMapName" . }}
  labels:
    helm.sh/chart: {{ include "lightbridge.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
data:
  config.yaml: |-
    {{- toYaml .Values.global.config | nindent 4 }}
