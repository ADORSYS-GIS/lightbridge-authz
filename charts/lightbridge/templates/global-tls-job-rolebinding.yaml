{{- if and .Values.global.tls.enabled .Values.global.tls.job.enabled .Values.global.tls.job.role.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "lightbridge.globalTlsJobRoleBindingName" . }}
  labels:
    helm.sh/chart: {{ include "lightbridge.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "lightbridge.globalTlsJobRoleName" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "lightbridge.globalTlsJobSAName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
