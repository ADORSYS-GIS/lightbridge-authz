# Source: lightbridge/templates/global-tls-job.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: miaou-lightbridge-global-tls
  labels:
    helm.sh/chart: lightbridge-0.5.3
    app.kubernetes.io/instance: miaou
    app.kubernetes.io/managed-by: Helm
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-delete-policy: hook-succeeded
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  template:
    metadata:
      labels:
        helm.sh/chart: lightbridge-0.5.3
        app.kubernetes.io/instance: miaou
        app.kubernetes.io/managed-by: Helm
    spec:
      serviceAccountName: miaou-lightbridge-global-tls-sa
      restartPolicy: OnFailure
      containers:
        - name: generate-tls
          image: docker.io/bitnami/kubectl:1.29.4
          command:
            - sh
            - -c
          args:
            - |
              set -euo pipefail
              SECRET=lightbridge-authz-tls
              if kubectl get secret "$SECRET" >/dev/null 2>&1; then
                echo "secret $SECRET already exists, skipping TLS generation"
                exit 0
              fi
              mkdir -p /tls
              apt-get update >/dev/null && apt-get install -y openssl >/dev/null
              openssl req -x509 -newkey rsa:2048 -nodes -days 3650 \
                -keyout /tls/api.key -out /tls/api.crt -subj "/CN=lightbridge-authz-api"
              openssl req -x509 -newkey rsa:2048 -nodes -days 3650 \
                -keyout /tls/opa.key -out /tls/opa.crt -subj "/CN=lightbridge-authz-opa"
              openssl req -x509 -newkey rsa:2048 -nodes -days 3650 \
                -keyout /tls/usage.key -out /tls/usage.crt -subj "/CN=lightbridge-authz-usage"
              kubectl create secret generic "$SECRET" \
                --from-file=api.crt=/tls/api.crt \
                --from-file=api.key=/tls/api.key \
                --from-file=opa.crt=/tls/opa.crt \
                --from-file=opa.key=/tls/opa.key \
                --from-file=usage.crt=/tls/usage.crt \
                --from-file=usage.key=/tls/usage.key >/dev/null
