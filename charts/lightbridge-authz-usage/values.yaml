# Default values for lightbridge-authz-usage.

controllers:
  main:
    containers:
      main:
        image:
          repository: ghcr.io/adorsys-gis/lightbridge-authz-usage
          tag: 0.5.0
          pullPolicy: IfNotPresent
        ports:
          - name: http
            containerPort: 3002
            protocol: TCP
        env:
          DATABASE_URL:
            valueFrom:
              secretKeyRef:
                identifier: secret
                key: DATABASE_URL

configMaps:
  config:
    enabled: true
    data:
      config.yaml: |-
        logging:
          level: info
        database:
          url: "${DATABASE_URL}"
          pool_size: 10
        otel:
          enabled: true
          otlp_endpoint: http://localhost:4317
          service_name: lightbridge-authz-usage
        server:
          usage:
            address: 0.0.0.0
            port: 3002
            tls:
              cert_path: /etc/lightbridge/tls/usage.crt
              key_path: /etc/lightbridge/tls/usage.key

secrets:
  secret:
    enabled: true
    stringData:
      DATABASE_URL: postgres://postgres:postgres@timescaledb:5432/lightbridge_authz_usage

service:
  main:
    controller: main
    ports:
      http:
        port: 3002

persistence:
  config:
    enabled: true
    type: configMap
    name: '{{ include "bjw-s.common.lib.chart.names.fullname" $ }}-config'
    advancedMounts:
      main:
        main:
          - path: /etc/lightbridge/config.yaml
            subPath: config.yaml
            readOnly: true
  tls:
    enabled: true
    type: secret
    name: '{{ include "bjw-s.common.lib.chart.names.fullname" $ }}-tls'
    globalMounts:
      - path: /etc/lightbridge/tls
        readOnly: true

serviceAccount:
  create: true

global: {}

env: []
volumeMounts: []
volumes: []
resources: {}
livenessProbe: {}
readinessProbe: {}
nodeSelector: {}
tolerations: []
affinity: {}
autoscaling:
  enabled: false
podAnnotations: {}
podLabels: {}
podSecurityContext: {}
securityContext: {}
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []
