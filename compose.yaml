---
services:
  authz-tls:
    image: alpine:3.20
    command:
      - sh
      - -c
      - |
        set -e
        mkdir -p /tls /host_tls
        apk add --no-cache openssl
        for host_file in api.key api.crt opa.key opa.crt usage.key usage.crt mcp.key mcp.crt; do
          if [ -f /host_tls/$$host_file ]; then
            cp /host_tls/$$host_file /tls/$$host_file
          fi
        done
        if [ ! -f /tls/api.key ]; then
          openssl req -x509 -newkey rsa:2048 -nodes -days 3650 \
            -keyout /tls/api.key -out /tls/api.crt \
            -subj "/CN=authz-api"
        fi
        if [ ! -f /tls/opa.key ]; then
          openssl req -x509 -newkey rsa:2048 -nodes -days 3650 \
            -keyout /tls/opa.key -out /tls/opa.crt \
            -subj "/CN=authz-opa"
        fi
        if [ ! -f /tls/usage.key ]; then
          openssl req -x509 -newkey rsa:2048 -nodes -days 3650 \
            -keyout /tls/usage.key -out /tls/usage.crt \
            -subj "/CN=authz-usage"
        fi
        if [ ! -f /tls/mcp.key ]; then
          openssl req -x509 -newkey rsa:2048 -nodes -days 3650 \
            -keyout /tls/mcp.key -out /tls/mcp.crt \
            -subj "/CN=authz-mcp"
        fi
        for tls_file in api.crt api.key opa.crt opa.key usage.crt usage.key mcp.crt mcp.key; do
          chmod 644 /tls/$$tls_file
          chown 65532:65532 /tls/$$tls_file
          if [ -f /tls/$$tls_file ]; then
            cp /tls/$$tls_file /host_tls/$$tls_file
            chmod 644 /host_tls/$$tls_file
          fi
        done
        chown -R 65532:65532 /tls
        chmod 755 /tls
        chown -R 65532:65532 /host_tls
        chmod 755 /host_tls
    volumes:
      - "authz_tls:/tls"
      - "./config/tls:/host_tls"

  postgresql:
    image: docker.io/bitnamilegacy/postgresql:17
    ports:
      - '5432:5432'
    volumes:
      - "postgresql_data:/bitnami/postgresql"
    environment:
      ALLOW_EMPTY_PASSWORD: "yes"
      POSTGRESQL_DATABASE: "lightbridge_authz"

  timescaledb:
    image: timescale/timescaledb:2.17.2-pg17
    ports:
      - "5433:5432"
    volumes:
      - "timescaledb_data:/var/lib/postgresql/data"
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
      POSTGRES_DB: "lightbridge_authz_usage"

  adminer:
    image: adminer
    ports:
      - "18080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DEFAULT_USERNAME: ${POSTGRES_USER:-postgres}
      ADMINER_DEFAULT_PASSWORD: ${POSTGRES_PASSWORD:-postgres-password}
      ADMINER_DESIGN: ${ADMINER_DESIGN:-dracula}
      ADMINER_PLUGINS: ${ADMINER_PLUGINS:-tables-filter tinymce}

  keycloak:
    image: quay.io/keycloak/keycloak:26.4.0
    ports:
      - "9100:9100"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: password
      KC_LOG_CONSOLE_COLOR: "true"
      KC_HTTP_PORT: 9100
    entrypoint: /bin/sh
    command:
      - -c
      - |
        set -ex

        /opt/keycloak/bin/kc.sh start-dev --import-realm # Start Keycloak in dev mode and import the realm
    volumes:
      - ./.docker/keycloak_config/:/opt/keycloak/data/import/:ro

  authz-migrate:
    image: lightbridge-authz-migrate
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 1G
          cpus: "0.5"
    build:
      context: .
      target: runtime
    command:
      - migrate
    volumes:
      - "./.docker/authz/container.yaml:/tmp/config.yaml:ro"
      - "authz_tls:/tls"
    environment:
      RUST_LOG: "debug"
      CONFIG_PATH: "/tmp/config.yaml"
    depends_on:
      postgresql:
        condition: service_started

  authz-api:
    image: lightbridge-authz
    depends_on:
      authz-migrate:
        condition: service_completed_successfully
      authz-tls:
        condition: service_started
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 1G
          cpus: "0.5"
    build:
      context: .
      target: runtime
    volumes:
      - ./.docker/authz/container.yaml:/tmp/config.yaml:ro
      - "authz_tls:/tls:ro"
    environment:
      RUST_LOG: "debug,opentelemetry_sdk=warn,opentelemetry_otlp=warn,h2=warn,hyper_util=warn,tower=warn"
      CONFIG_PATH: "/tmp/config.yaml"
    ports:
      - "13000:3000"
    command:
      - api
    healthcheck:
      test: ["CMD", "/usr/local/bin/lightbridge-authz-healthcheck", "-r", "3000"]
      interval: 30s
      timeout: 3s
      start_period: 1s
      retries: 3

  authz-opa:
    image: lightbridge-authz
    depends_on:
      authz-migrate:
        condition: service_completed_successfully
      authz-tls:
        condition: service_started
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 1G
          cpus: "0.5"
    volumes:
      - ./.docker/authz/container.yaml:/tmp/config.yaml:ro
      - "authz_tls:/tls:ro"
    environment:
      RUST_LOG: "debug,opentelemetry_sdk=warn,opentelemetry_otlp=warn,h2=warn,hyper_util=warn,tower=warn"
      CONFIG_PATH: "/tmp/config.yaml"
    ports:
      - "13001:3001"
    command:
      - opa
    healthcheck:
      test: ["CMD", "/usr/local/bin/lightbridge-authz-healthcheck", "-r", "3001"]
      interval: 30s
      timeout: 3s
      start_period: 1s
      retries: 3

  authz-mcp:
    image: lightbridge-mcp
    depends_on:
      authz-migrate:
        condition: service_completed_successfully
      authz-tls:
        condition: service_started
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 1G
          cpus: "0.5"
    build:
      context: .
      target: mcp-runtime
    volumes:
      - ./.docker/authz/container.yaml:/tmp/config.yaml:ro
      - "authz_tls:/tls:ro"
    environment:
      RUST_LOG: "debug,opentelemetry_sdk=warn,opentelemetry_otlp=warn,h2=warn,hyper_util=warn,tower=warn"
      CONFIG_PATH: "/tmp/config.yaml"
      TLS_CERT_PATH: "/tls/mcp.crt"
      TLS_KEY_PATH: "/tls/mcp.key"
    ports:
      - "13003:3000"
    command:
      - serve
    healthcheck:
      test: ["CMD", "/usr/local/bin/lightbridge-authz-healthcheck", "-r", "3000"]
      interval: 30s
      timeout: 3s
      start_period: 1s
      retries: 3

  mcp-inspector:
    image: ghcr.io/modelcontextprotocol/inspector:latest
    depends_on:
      authz-mcp:
        condition: service_started
    environment:
      HOST: "0.0.0.0"
      MCP_AUTO_OPEN_ENABLED: "false"
      NODE_EXTRA_CA_CERTS: "/tls/mcp.crt"
    volumes:
      - "authz_tls:/tls:ro"
    ports:
      - "127.0.0.1:6274:6274"
      - "127.0.0.1:6277:6277"

  authz-usage-migrate:
    image: lightbridge-authz-usage
    build:
      context: .
      target: usage-runtime
    command:
      - migrate
    volumes:
      - "./.docker/usage/container.yaml:/tmp/config.yaml:ro"
    environment:
      RUST_LOG: "debug"
      CONFIG_PATH: "/tmp/config.yaml"
    depends_on:
      timescaledb:
        condition: service_started

  authz-usage:
    image: lightbridge-authz-usage
    build:
      context: .
      target: usage-runtime
    command:
      - serve
    volumes:
      - "./.docker/usage/container.yaml:/tmp/config.yaml:ro"
      - "authz_tls:/tls:ro"
    environment:
      RUST_LOG: "debug,opentelemetry_sdk=warn,opentelemetry_otlp=warn,h2=warn,hyper_util=warn,tower=warn"
      CONFIG_PATH: "/tmp/config.yaml"
    ports:
      - "13002:3002"
    depends_on:
      authz-usage-migrate:
        condition: service_completed_successfully
      authz-tls:
        condition: service_started
    healthcheck:
      test: ["CMD", "/usr/local/bin/lightbridge-authz-healthcheck", "-r", "3002"]
      interval: 30s
      timeout: 3s
      start_period: 1s
      retries: 3

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686" # UI
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP

volumes:
  postgresql_data:
    driver: local
  authz_tls:
    driver: local
  timescaledb_data:
    driver: local
