---
services:
  authz-tls:
    image: alpine:3.20
    command:
      - sh
      - -c
      - |
        set -e
        apk add --no-cache openssl
        mkdir -p /tls
        if [ ! -f /tls/api.key ]; then
          openssl req -x509 -newkey rsa:2048 -nodes -days 3650 \
            -keyout /tls/api.key -out /tls/api.crt \
            -subj "/CN=lightbridge-authz-api"
        fi
        if [ ! -f /tls/opa.key ]; then
          openssl req -x509 -newkey rsa:2048 -nodes -days 3650 \
            -keyout /tls/opa.key -out /tls/opa.crt \
            -subj "/CN=lightbridge-authz-opa"
        fi
        chmod 644 /tls/api.crt /tls/opa.crt
        chmod 644 /tls/api.key /tls/opa.key
    volumes:
      - "authz_tls:/tls"

  postgresql:
    image: docker.io/bitnamilegacy/postgresql:17
    ports:
      - '5432:5432'
    volumes:
      - "postgresql_data:/bitnami/postgresql"
    environment:
      ALLOW_EMPTY_PASSWORD: "yes"
      POSTGRESQL_DATABASE: "lightbridge_authz"

  adminer:
    image: adminer
    ports:
      - "18080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DEFAULT_USERNAME: ${POSTGRES_USER:-postgres}
      ADMINER_DEFAULT_PASSWORD: ${POSTGRES_PASSWORD:-postgres-password}
      ADMINER_DESIGN: ${ADMINER_DESIGN:-dracula}
      ADMINER_PLUGINS: ${ADMINER_PLUGINS:-tables-filter tinymce}

  keycloak:
    image: quay.io/keycloak/keycloak:26.4.0
    ports:
      - "9100:9100"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: password
      KC_LOG_CONSOLE_COLOR: "true"
      KC_HTTP_PORT: 9100
    entrypoint: /bin/sh
    command:
      - -c
      - |
        set -ex

        /opt/keycloak/bin/kc.sh start-dev --import-realm # Start Keycloak in dev mode and import the realm
    volumes:
      - ./.docker/keycloak_config/:/opt/keycloak/data/import/:ro

  authz-migrate:
    image: lightbridge-authz-migrate
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 1G
          cpus: "0.5"
    build:
      context: .
      target: migrate
    volumes:
      - "./.docker/authz/container.yaml:/tmp/config.yaml:ro"
      - "authz_tls:/tls"
    environment:
      RUST_LOG: "debug"
      CONFIG_PATH: "/tmp/config.yaml"
    depends_on:
      postgresql:
        condition: service_started

  authz-api:
    image: lightbridge-authz
    depends_on:
      authz-migrate:
        condition: service_completed_successfully
      authz-tls:
        condition: service_started
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 1G
          cpus: "0.5"
    build:
      context: .
      target: runtime
    volumes:
      - ./.docker/authz/container.yaml:/tmp/config.yaml:ro
      - "authz_tls:/tls:ro"
    environment:
      RUST_LOG: "debug"
      CONFIG_PATH: "/tmp/config.yaml"
    ports:
      - "13000:3000"
    command:
      - api

  authz-opa:
    image: lightbridge-authz
    depends_on:
      authz-migrate:
        condition: service_completed_successfully
      authz-tls:
        condition: service_started
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 1G
          cpus: "0.5"
    volumes:
      - ./.docker/authz/container.yaml:/tmp/config.yaml:ro
      - "authz_tls:/tls:ro"
    environment:
      RUST_LOG: "debug"
      CONFIG_PATH: "/tmp/config.yaml"
    ports:
      - "13001:3001"
    command:
      - opa
    healthcheck:
      test: ["CMD", "/usr/local/bin/lightbridge-authz-healthcheck", "-r", "3001"]
      interval: 30s
      timeout: 3s
      start_period: 1s
      retries: 3

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686" # UI
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP

volumes:
  postgresql_data:
    driver: local
  authz_tls:
    driver: local
